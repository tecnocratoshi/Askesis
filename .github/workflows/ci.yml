name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Guardrails (warning)
        run: npm run guardrail:all 2>&1 | tee guardrails.log || true
        continue-on-error: true

      - name: Upload guardrails report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: guardrails-log
          path: guardrails.log

      - name: Lint
        run: npm run lint

      - name: Unit and integration tests
        run: npm test

  scenario:
    name: Scenario Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: validate
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Scenario tests
        run: npm run test:scenario
